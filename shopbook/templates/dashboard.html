<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopBook - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4">📊 ShopBook Dashboard</h1>
        <div class="row">

            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Customer</h5>
                        <p class="card-text fs-3">{{customer_count}}</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-success mb-3 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Total Products</h5>
                        <p class="card-text fs-3">{{ product_count }}</p>
                    </div>
                </div>
            </div>

        </div>
        <div class="row mt-5">
                <h3 class="mb-4 text-muted">🚀 Quick Actions</h3>

                <div class="col-md-4">
                    <div class="card h-100 shadow-sm text-center border-primary">
                        <div class="card-body py-4">
                            <h5 class="card-title mb-3">📦 Product Inventory</h5>
                            <a href="{{url_for('list_products')}}" class="btn btn-primary w-100">View Inventory</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100 shadow-sm text-center border-primary">
                        <div class="card-body py-4">
                            <h5 class="card-title mb-3">👥 Khata Ledger</h5>
                            <a href="{{url_for('list_customers')}}" class="btn btn-primary w-100">Open Directory</a>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card h-100 shadow-sm text-center border-primary">
                        <div class="card-body py-4">
                            <h5 class="card-title mb-3">🧾 Invoice Center</h5>
                            <a href="{{url_for('list_bills')}}" class="btn btn-primary w-100">View Invoices</a>
                        </div>
                    </div>
                </div>

            </div>

    </div>
</body>
</html>
