<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Customers - ShopBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>👤 Customer Ledger (Khata)</h2>
            <a href="{{ url_for('add_customer') }}" class="btn btn-success">+ Add New Customer</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Customer Name</th>
                            <th>Phone Number</th>
                            <th>Balance Due (₹)</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for customer in customers %}
                        <tr>
                            <td>{{ customer.id }}</td>
                            <td>{{ customer.name }}</td>
                            <td>{{ customer.phone if customer.phone else 'N/A' }}</td>
                            <td class="{{ 'text-danger fw-bold' if customer.balance_due > 0 else 'text-muted'}}">₹{{ customer.balance_due }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="0" class="text-center text-muted py-4">No customers registered yet.</td>
                        </tr>
                        {% endfor %}

                    </tbody>
                </table>
            </div>
        </div>

    </div>
</body>
</html>
